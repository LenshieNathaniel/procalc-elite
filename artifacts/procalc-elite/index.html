    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ProCalc Elite",
      "applicationCategory": "FinanceApplication",
      "applicationSubCategory": "Mortgage Calculator",
      "operatingSystem": "Web",
      "description": "ProCalc Elite is a mortgage wealth intelligence engine that uses bank-grade amortization to surface the Wealth Tipping Point, PMI drain, and refinance opportunities. All calculations run locally in the browser.",
      "url": "https://procalc-elite.replit.app/",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Bank-grade amortization engine",
        "Wealth Tipping Point detection",
        "PMI drain analysis",
        "Refinance savings simulator",
        "Labor-hour debt conversion",
        "Privacy-first local computation"
      ]
    }
    </script>

    <!-- JSON-LD: FinancialService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "ProCalc Elite — Mortgage Wealth Intelligence",
      "description": "An institutional-grade mortgage diagnostic platform that helps borrowers identify long-term equity-growth opportunities and reduce lifetime interest exposure.",
      "serviceType": "Mortgage Wealth Optimization",

      "url": "https://procalc-elite.replit.app/",
      "provider": {
        "@type": "Organization",
        "name": "ProCalc Elite"
      }
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a Mortgage Wealth Tipping Point?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Mortgage Wealth Tipping Point is the moment in an amortization schedule when the principal portion of your monthly payment exceeds the interest portion. Before this point, the bank builds equity faster than you do; after it, your equity accelerates."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Labor Hour Debt Metric?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Labor Hour Debt Metric converts total mortgage interest into the number of hours of labor required to service that debt at your hourly wage. It reframes mortgage cost in time, not just dollars."
          }
        }
      ]
    }
    </script>
