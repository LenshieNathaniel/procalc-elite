kind = "web"
previewPath = "/"
title = "ProCalc Elite"
version = "1.0.0"
id = "artifacts/procalc-elite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18654

[services.development]
run = "pnpm --filter @workspace/procalc-elite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/procalc-elite", "run", "build" ]
publicDir = "artifacts/procalc-elite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18654"
BASE_PATH = "/"
